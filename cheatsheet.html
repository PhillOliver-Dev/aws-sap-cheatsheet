<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Solutions Architect Professional — Cheat Sheet</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-nav: #010409;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-2: #79c0ff;
    --cue: #d29922;
    --cue-bg: rgba(210, 153, 34, 0.12);
    --warn: #f85149;
    --warn-bg: rgba(248, 81, 73, 0.12);
    --good: #3fb950;
    --good-bg: rgba(63, 185, 80, 0.12);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    font-size: 15px;
  }
  header.top {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-nav);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
  }
  header.top .row1 {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header.top h1 {
    font-size: 18px;
    margin: 0;
    color: #fff;
    white-space: nowrap;
  }
  header.top input[type="search"] {
    flex: 1;
    min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
  }
  header.top input[type="search"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
  }
  header.top button {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  header.top button:hover { border-color: var(--accent); color: #fff; }
  nav.domains {
    display: flex;
    gap: 6px;
    padding: 8px 0 0;
    flex-wrap: wrap;
  }
  nav.domains a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    white-space: nowrap;
  }
  nav.domains a:hover, nav.domains a.active {
    color: #fff;
    border-color: var(--accent);
    background: rgba(88,166,255,0.1);
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }
  section.domain {
    margin-bottom: 40px;
  }
  .domain-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 12px 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 16px;
  }
  .domain-header h2 {
    margin: 0;
    font-size: 22px;
    color: #fff;
  }
  .domain-header .num {
    color: var(--accent);
    font-weight: 700;
    margin-right: 8px;
  }
  .domain-header .toggle {
    color: var(--text-dim);
    font-size: 13px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: opacity 0.15s;
  }
  .card.dimmed { opacity: 0.18; }
  .card.hidden { display: none; }
  .card h3 {
    margin: 0 0 10px;
    font-size: 16px;
    color: var(--accent-2);
  }
  .card .what {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-style: italic;
  }
  .field {
    margin-bottom: 10px;
    font-size: 13.5px;
  }
  .field .label {
    display: inline-block;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
  }
  .label.use { background: var(--good-bg); color: var(--good); }
  .label.cue { background: var(--cue-bg); color: var(--cue); }
  .label.warn { background: var(--warn-bg); color: var(--warn); }
  .field ul {
    margin: 4px 0 0;
    padding-left: 20px;
  }
  .field li { margin-bottom: 3px; }
  mark {
    background: rgba(210, 153, 34, 0.4);
    color: #fff;
    padding: 0 2px;
    border-radius: 2px;
  }
  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 30px 20px;
    border-top: 1px solid var(--border);
  }
  @media print {
    header.top { position: static; }
    .card.dimmed { opacity: 1 !important; }
    .card.hidden { display: block !important; }
    body { background: #fff; color: #000; font-size: 11px; }
    .cards { grid-template-columns: repeat(2, 1fr); }
    .card { break-inside: avoid; border: 1px solid #999; }
    .domain-header .toggle { display: none; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="row1">
    <h1>AWS SAP Cheat Sheet</h1>
    <input type="search" id="search" placeholder="Filter services (e.g. Transit Gateway, RDS, SCP)..." autocomplete="off">
    <button id="expandAll">Expand all</button>
    <button id="collapseAll">Collapse all</button>
    <button onclick="window.print()">Print</button>
  </div>
  <nav class="domains" id="nav"></nav>
</header>

<main id="main"></main>

<footer>AWS Solutions Architect Professional — Study Cheat Sheet · 13 domains covering the full SAP-C02 exam blueprint · Verify against latest AWS docs before exam</footer>

<script>
const DOMAINS = [
  {
    id: "orgs", title: "Organizations & Multi-Account",
    cards: [
      {
        h: "AWS Organizations",
        what: "Centralized management service for multiple AWS accounts — consolidates billing, applies Service Control Policies (SCPs) for governance at root/OU/account level, and provides APIs for automated account creation. Uses a hierarchical structure (root -> OUs -> accounts) and supports up to 10,000 accounts per org. The management account (formerly 'master') owns the org and is the only one that can create or invite new accounts.",
        use: ["Consolidated billing across accounts", "Need to apply governance/policies org-wide", "Automated account provisioning via APIs", "Volume-pricing discounts from combined usage"],
        cue: ["'50+ accounts'", "'centrally manage billing'", "'consolidate'", "'automate account creation'"],
        warn: ["Max 10,000 accounts per org (soft quota)", "Management (root) account is special — protect it, don't run workloads there", "Does NOT grant permissions, only structures them"]
      },
      {
        h: "Service Control Policies (SCPs)",
        what: "Organization-level policy that defines the maximum available permissions boundary for accounts within an OU or the entire org. Applied at root, OU, or individual account level and cascade down to all child accounts. Crucially, SCPs are permission FILTERS — they never GRANT permissions, they only restrict what's allowed. IAM policies still required for actual access. FullAWSAccess SCP (allow *) is attached by default to root and all OUs.",
        use: ["Block services org-wide (e.g. deny regions, deny GuardDuty tampering)", "Enforce guardrails that even root can't override", "Govern member accounts centrally"],
        cue: ["'even the root user'", "'maximum permissions'", "'prevent any account from'", "'enforce guardrails'"],
        warn: ["SCPs never GRANT — they only filter what's allowed. IAM still required.", "FullAWSAccess SCP is attached by default — removing it denies everything", "Don't attach to management account (you could lock yourself out)"]
      },
      {
        h: "AWS Control Tower",
        what: "Pre-built landing zone that establishes a multi-account governance baseline in ~30 minutes. Includes Account Factory for automated account provisioning — new accounts get SCPs, Config rules, CloudTrail, and GuardDuty applied automatically. Guardrails are both preventive (SCP-based) and detective (Config rule-based). Creates dedicated log archive and audit core accounts for centralized logging and security review. Built on top of Organizations, CloudFormation StackSets, Config, and other services — not a replacement for them.",
        use: ["Greenfield multi-account setup with least effort", "Want preventive + detective guardrails out of the box", "Need automated account provisioning (Account Factory)", "Centralized CloudTrail + Config logging"],
        cue: ["'landing zone'", "'guardrails'", "'least operational overhead' (for governance)", "'account factory'"],
        warn: ["Built on top of Organizations — not a replacement", "Region-launch guardrail restricts new accounts to governed regions", "Hard to retrofit onto a messy existing org without planning"]
      },
      {
        h: "AWS Resource Access Manager (RAM)",
        what: "Service that enables sharing AWS resources across accounts, OUs, or an entire Organization without resource duplication. Shares resources like Transit Gateways, VPC subnets (VPC sharing), License Manager configurations, Route 53 Resolver rules, and Aurora clusters. Owner account retains full control; consumer accounts get defined access. Works within an Organization (recommended) or with any account via invitation.",
        use: ["Share a Transit Gateway with all accounts", "Share subnets (VPC sharing) under same Organization", "Avoid duplicating shared infrastructure"],
        cue: ["'share transit gateway'", "'share across accounts'", "'within the Organization'", "'avoid duplication'"],
        warn: ["Cross-org sharing possible but single org recommended", "VPC subnet sharing = owning account manages networking, others consume"]
      },
      {
        h: "AWS Config Aggregator",
        what: "Feature of AWS Config that collects configuration and compliance data from multiple accounts and Regions into a single 'aggregator' account for centralized monitoring. Supports Organization-level aggregation (auto-discovers new accounts) or individual account authorization. Provides read-only visibility — doesn't remediate non-compliance, just reports it. Useful for compliance auditing and security posture management across the org.",
        use: ["Centralized compliance monitoring", "Single pane of glass for Config rules across org", "Audit posture across all member accounts"],
        cue: ["'monitor compliance across accounts'", "'centralized view'", "'aggregator account'"],
        warn: ["Must enable Config in each source account first", "Aggregator is read-only — doesn't fix non-compliance"]
      },
      {
        h: "CloudFormation StackSets",
        what: "CloudFormation feature for deploying a single template across multiple accounts and Regions from one operation. Requires IAM roles in target accounts (administration + execution roles). Supports deployment to Organizations OUs, staged rollouts, and automatic drift detection. Common use cases: deploying security baselines, Config rules, IAM roles, or guardrails consistently across the entire org.",
        use: ["Standardize IAM roles, Config rules, guardrails org-wide", "Push a security baseline to every account", "Recreate deleted role across all accounts quickly"],
        cue: ["'deploy across all accounts'", "'standardize'", "'org-wide'", "'multiple regions and accounts'"],
        warn: ["Needs IAM roles in target accounts (StackSet execution role)", "Deployment can take time across many accounts/regions"]
      },
      {
        h: "AWS IAM Identity Center (AWS SSO)",
        what: "Centralized identity service (formerly AWS SSO) providing single sign-on to all AWS accounts in an Organization plus cloud applications. Manages users and groups in a built-in directory or federates with external identity providers (Active Directory, Okta, Azure AD via SAML). Uses 'permission sets' (collections of managed policies) assigned to users/groups at the account or OU level. Replaces per-account IAM users for workforce access.",
        use: ["One identity for all AWS accounts", "Grant a 'security audit' permission set across accounts", "Federate with AD / external IdP", "Replace per-account IAM users"],
        cue: ["'single sign-on'", "'centralized access'", "'permission set'", "'security team needs access to all accounts'"],
        warn: ["Formerly AWS SSO — old name may appear on exam", "Standalone (not org-integrated) mode exists but org-integrated is preferred"]
      },
      {
        h: "Organizational Unit (OU) Strategy",
        what: "Organizational Unit (OU) design pattern: group accounts by environment (prod/non-prod), business unit, or workload to enable targeted policy application via SCPs. SCPs cascade down the hierarchy — child OUs inherit parent OU policies (intersection of all applied policies). Recommended to separate prod/non-prod/security/logging/sandbox into different OUs to apply appropriate guardrails. Avoid deep nesting (>3-4 levels) as policy interaction becomes hard to reason about.",
        use: ["Apply SCPs to a whole environment (e.g. prod OU)", "Mirror company structure (e.g. BU OUs)", "Separate prod / non-prod / security / logging accounts"],
        cue: ["'business unit autonomy'", "'separate environments'", "'apply policy per OU'"],
        warn: ["SCPs cascade down — child inherits parent OU policies", "Don't nest too deep — policy intersection gets hard to reason about"]
      },
      {
        h: "Cross-Region Aggregation / Logging Account",
        what: "Best-practice logging architecture: designate a dedicated 'log archive' account to receive CloudTrail, Config, and other logs from all member accounts for centralization, immutability, and audit compliance. Typically paired with a 'security/audit' account for security tooling (GuardDuty, Security Hub, Config Aggregator). The org-wide CloudTrail trail should be created in the management account and deliver to the log archive S3 bucket with restrictive bucket policies + KMS encryption.",
        use: ["Centralized audit/security logging", "Meet compliance requirements for log immutability", "Feed SIEM / Athena queries"],
        cue: ["'centralized logging'", "'audit trail'", "'log archive account'", "'security account'"],
        warn: ["Use bucket policies + KMS to lock logs down", "CloudTrail org trail in management account is the recommended pattern"]
      },
      {
        h: "AWS Service Catalog",
        what: "Service that lets administrators create catalogs of approved CloudFormation-based 'products' that end-users can self-service launch without IAM admin permissions. Admins define portfolios containing versioned products and apply constraints (e.g., restrict instance types, regions, or parameters). Users see only allowed products and launch them with standard configurations. Enforces governance/compliance while enabling developer self-service for common infrastructure needs.",
        use: ["Devs launch pre-approved infra without IAM admin", "Enforce compliance/standards at launch", "Versioned products with constraints"],
        cue: ["'self-service'", "'approved templates'", "'developers launch their own'", "'governed provisioning'"],
        warn: ["Admin creates portfolios; users only see products they're allowed", "Built on CloudFormation underneath"]
      },
      {
        h: "AWS License Manager",
        what: "Service for tracking and managing software licenses (Oracle, Microsoft, SQL Server, etc.) across AWS accounts and on-premises. Create license rules that prevent over-deployment or unauthorized usage by integrating with Service Catalog, AMIs, and EC2 launch controls. Provides a central inventory of license usage, alerts for approaching limits, and integration with AWS Systems Manager for cross-account visibility. Useful for license compliance and cost optimization.",
        use: ["Prevent license violations / over-deployment", "Enforce hard rules on AMIs/instances", "Track usage across org via RAM"],
        cue: ["'license tracking'", "'Oracle/Microsoft licenses'", "'compliance with licensing'", "'prevent over-deployment'"],
        warn: ["Rules enforced via integration with Service Catalog / AMIs", "Cross-account via Organizations"]
      }
    ]
  },
  {
    id: "net", title: "Advanced Networking",
    cards: [
      {
        h: "AWS Transit Gateway (TGW)",
        what: "Regional, scalable hub-and-spoke router that interconnects VPCs, VPN connections, Direct Connect gateways, and other TGWs (via inter-region peering). Scales to 5,000 attachments per TGW per region and supports transitive routing — solving the key limitation of VPC peering. Supports route tables, security group referencing across attachments, and multicast. Shared via RAM across accounts in an Organization to centralize network admin. Billed per-attachment/hour + per-GB processed.",
        use: ["Connect many VPCs without full-mesh peering", "Inter-Region peering between regional TGWs", "Hub-and-spoke with a shared services/inspection VPC", "Centralized egress/ingress inspection"],
        cue: ["'many VPCs'", "'scalable'", "'central hub/router'", "'replace full mesh'", "'500 VPCs'"],
        warn: ["Peering does NOT support transitive routing — TGW solves this", "Share via RAM to avoid one-per-account", "TGW inter-region peering has bandwidth & cost implications"]
      },
      {
        h: "VPC Peering",
        what: "Network connection between exactly two VPCs that routes traffic between them using private IP addresses, working across accounts and across regions. Traffic stays on the AWS backbone (not the internet). Does NOT support transitive routing — if A peers with B and B peers with C, A cannot reach C through B. Each pair requires its own peering connection, making full-mesh topology O(n²) and unmanageable past ~5 VPCs (use Transit Gateway instead).",
        use: ["1:1 or small number of VPC connections", "Cross-Region private connectivity without transit", "Free transitive routing is NOT required"],
        cue: ["'two VPCs'", "'small scale'", "'cost-effective'"],
        warn: ["NO transitive routing (A-B, B-C means A-C needs its own peering)", "Does NOT work with overlapping CIDRs", "Full mesh = O(n²) connections — pick TGW instead"]
      },
      {
        h: "AWS Direct Connect",
        what: "Dedicated private network connection (1, 10, or 100 Gbps) from on-prem data centers to AWS, provisioned through a Direct Connect partner or AWS. Bypasses the public internet for consistent low-latency, predictable performance, and reduced data transfer costs. Uses 802.1Q VLANs and BGP to route traffic. NOT encrypted by default — use MACsec (on supported ports) or layer a Site-to-Site VPN over DX for IPsec encryption.",
        use: ["Consistent low-latency private connectivity", "Large data transfers / hybrid workloads", "Predictable network performance, bypass internet"],
        cue: ["'dedicated'", "'consistent performance'", "'private connection'", "'predictable'", "'jumbo frames (9001 MTU)'"],
        warn: ["Single link is a failure point — add a second DX + Site-to-Site VPN backup", "Use BGP AS path prepending or LOAP for failover", "Hosted vs Dedicated offerings differ", "DX alone is not encryption; use MACsec or VPN over DX for encryption"]
      },
      {
        h: "Site-to-Site VPN",
        what: "Highly available IPsec VPN connection over the public internet between on-prem and an AWS Virtual Private Gateway (VGW) or Transit Gateway. Each connection provisions two redundant IPsec tunnels (one in each AZ) for HA. Can be provisioned in hours vs weeks for Direct Connect. Often used as backup to DX or to add encryption on top of DX (VPN-over-DX). Performance varies with internet conditions, unlike DX.",
        use: ["Quick connectivity (hours not weeks)", "Backup to Direct Connect", "Lower-cost hybrid connectivity", "Encryption of traffic over DX (VPN-over-DX)"],
        cue: ["'quickly'", "'backup'", "'encrypt DX'", "'hours'"],
        warn: ["Internet-dependent — variable performance vs DX", "Use dual tunnels + dual VGW/TGW for HA", "Transit Gateway VPN attachments recommended over VGW"]
      },
      {
        h: "Route 53 Routing Policies",
        what: "Route 53 supports eight routing policies that control how DNS queries are answered: Simple (single resource), Weighted (split traffic by %), Latency (route to lowest-latency region for user), Failover (active-passive DR), Geolocation (route by user's country/continent — location-based, not performance-based), Geoproximity (route by geographic proximity with traffic-flow bias tuning), Multivalue (return multiple health-checked IPs — DNS-level, not ELB), and IP-based routing (route by client CIDR block). Geolocation differs from Latency — location-based, not performance-based.",
        use: ["Latency -> lowest-latency region", "Geolocation -> route by user location (compliance/localization)", "Weighted -> canary/blue-green/A-B testing", "Failover -> active-passive DR"],
        cue: ["'lowest latency' -> latency", "'user country/region' -> geolocation", "'percent of traffic' / 'canary' -> weighted", "'active-passive' -> failover"],
        warn: ["Geolocation != latency — geolocation is location-based, not performance-based", "Geoproximity uses bias + Route 53 traffic flow", "Multivalue != ELB — it's DNS-based health-checked responses"]
      },
      {
        h: "Amazon CloudFront",
        what: "Global Content Delivery Network with 400+ edge locations (Points of Presence) that caches HTTP/HTTPS content close to end-users to reduce latency and offload origin. Supports dynamic content, video streaming, Lambda@Edge (Lambda functions run at edge for custom logic), and CloudFront Functions (lightweight edge compute for HTTP manipulation). Integrated with AWS Shield Standard (free DDoS protection) and WAF. Origins can be S3, ALB, EC2, MediaPackage, or any HTTP endpoint (including on-prem). HTTP/HTTPS only — use Global Accelerator for non-HTTP workloads.",
        use: ["Cache static + dynamic HTTP/HTTPS content globally", "Terminate TLS at edge, reduce origin load", "Lambda@Edge / CloudFront Functions for edge logic", "S3 origin for static site"],
        cue: ["'global audience'", "'cache'", "'reduce latency' (HTTP)", "'DDoS protection' (with Shield)"],

      },
      {

        warn: ["More expensive than Route 53 alone", "Doesn't cache — that's CloudFront", "Routes at L4, no path-based routing"]
      },
      {

        use: ["Path-based / host-based routing", "WebSocket, HTTP/2", "TLS termination + SNI", "ECS/Fargate/Lambda targets"],
        cue: ["'HTTP'", "'path/host-based routing'", "'WebSocket'", "'Lambda target'"],
        warn: ["L7 only — no raw TCP/UDP (use NLB)", "No static IP (use Global Accelerator in front if needed)", "Cross-zone balancing is on by default"]
      },

      },
      {

        use: ["Private access to most AWS services (not just S3/DDB)", "PrivateLink for SaaS partner services", "On-prem via DX to AWS APIs privately"],

        use: ["Centralized N/S traffic inspection", "IDS/IPS at VPC level", "Domain filtering, protocol detection", "Compliance (PCI/SOC)"],
        cue: ["'stateful inspection'", "'intrusion detection'", "'centralized inspection VPC'"],
        warn: ["Deploy in inspection VPC + TGW for central model", "Suricata-compatible rule format", "More expensive than NACLs/SGs"]
      },
      {
        h: "VPC Traffic Mirroring",
        what: "VPC feature that copies network traffic from any elastic network interface (ENI) to a security appliance (e.g., IDS/IPS, intrusion detection) running on EC2 for deep packet inspection. Source + target ENIs must be in the same VPC or peered VPCs. Captures actual packets (unlike Flow Logs which are metadata-only), enabling IDS/IPS, threat detection, and compliance forensics. Billed per GB mirrored. Does NOT filter or block — it's purely a passive copy.",
        use: ["IDS/IPS, threat detection", "Compliance forensics", "Capture traffic between subnets"],
        cue: ["'inspect all traffic'", "'deep packet inspection'", "'copy traffic'"],
        warn: ["Source + target must support — charges per GB mirrored", "Doesn't filter or block — purely a copy"]
      },

// ===== Render =====
const main = document.getElementById('main');
const nav = document.getElementById('nav');
const searchIndex = [];

DOMAINS.forEach((d, di) => {
  const section = document.createElement('section');
  section.className = 'domain';
  section.id = d.id;

  const header = document.createElement('div');
  header.className = 'domain-header';
  header.innerHTML = '<div><span class="num">' + (di+1) + '</span><h2 style="display:inline">' + d.title + '</h2></div><span class="toggle">v collapse</span>';
  section.appendChild(header);

  const cardsWrap = document.createElement('div');
  cardsWrap.className = 'cards';

  d.cards.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.text = (c.h + ' ' + c.what + ' ' + (c.use||[]).join(' ') + ' ' + (c.cue||[]).join(' ') + ' ' + (c.warn||[]).join(' ')).toLowerCase();

    const useHTML = (c.use||[]).length ? '<div class="field"><span class="label use">Use when</span><ul>' + c.use.map(u => '<li>' + u + '</li>').join('') + '</ul></div>' : '';
    const cueHTML = (c.cue||[]).length ? '<div class="field"><span class="label cue">Exam cue</span><ul>' + c.cue.map(u => '<li>' + u + '</li>').join('') + '</ul></div>' : '';
    const warnHTML = (c.warn||[]).length ? '<div class="field"><span class="label warn">Watch out</span><ul>' + c.warn.map(u => '<li>' + u + '</li>').join('') + '</ul></div>' : '';

    card.innerHTML = '<h3>' + c.h + '</h3><div class="what">' + c.what + '</div>' + useHTML + cueHTML + warnHTML;
    cardsWrap.appendChild(card);
    searchIndex.push(card);
  });

  section.appendChild(cardsWrap);
  main.appendChild(section);

  // nav link
  const a = document.createElement('a');
  a.href = '#' + d.id;
  a.dataset.target = d.id;
  a.textContent = (di+1) + '. ' + d.title;
  nav.appendChild(a);

  // collapse toggle
  header.addEventListener('click', () => {
    cardsWrap.style.display = cardsWrap.style.display === 'none' ? 'grid' : 'none';
    header.querySelector('.toggle').textContent = cardsWrap.style.display === 'none' ? '> expand' : 'v collapse';
  });
});

// ===== Expand / Collapse all =====
document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('.domain').forEach(s => {
    const cards = s.querySelector('.cards');
    cards.style.display = 'grid';
    s.querySelector('.toggle').textContent = 'v collapse';
  });
});
document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.domain').forEach(s => {
    const cards = s.querySelector('.cards');
    cards.style.display = 'none';
    s.querySelector('.toggle').textContent = '> expand';
  });
});

// ===== Search =====
const search = document.getElementById('search');
search.addEventListener('input', () => {
  const q = search.value.trim().toLowerCase();
  searchIndex.forEach(card => {
    if (!q) {
      card.classList.remove('dimmed', 'hidden');
      return;
    }
    if (card.dataset.text.includes(q)) {
      card.classList.remove('dimmed', 'hidden');
      const h = card.querySelector('h3');
      const orig = h.dataset.orig || h.textContent;
      h.dataset.orig = orig;
      h.innerHTML = orig.replace(new RegExp(escapeReg(q), 'gi'), m => '<mark>' + m + '</mark>');
    } else {
      card.classList.add('dimmed');
    }
  });
});

function escapeReg(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ===== Scroll-spy nav highlight =====
const navLinks = Array.from(document.querySelectorAll('nav.domains a'));
const sections = Array.from(document.querySelectorAll('section.domain'));
window.addEventListener('scroll', () => {
  let cur = sections.length ? sections[0].id : null;
  const y = window.scrollY + 120;
  sections.forEach(s => { if (s.offsetTop <= y) cur = s.id; });
  navLinks.forEach(a => a.classList.toggle('active', a.dataset.target === cur));
});
</script>
